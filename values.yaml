# Default values for zhefuz-homepage
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: ghcr.io/arcatva/zhefuz
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets:
  - name: ghcr-arcatva

nameOverride: ""
fullnameOverride: ""

# Namespace to deploy to
namespace: zhefuz-homepage

resources:
  requests:
    memory: "20Mi"
    cpu: "10m"
  limits:
    memory: "50Mi"
    cpu: "50m"

service:
  type: ClusterIP
  port: 80
  targetPort: 80

nodeSelector: {}

tolerations: []

affinity: {}
